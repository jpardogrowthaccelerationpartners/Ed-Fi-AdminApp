name: UI Playwright E2E

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, "patch-v*"]
    paths:
      - .github/workflows/run-e2e-ui.yml
      - tests/e2e/**
      - playwright.config.ts
      - package.json
      - package-lock.json
      - compose/**
      - eng/github-actions/**
      - packages/api/**
      - packages/fe/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  playwright-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node 22.23.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.0
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Create local TLS certificate
        working-directory: ./compose/ssl
        run: bash ./generate-certificate.sh

      - name: Start Docker Compose services
        working-directory: ./compose
        shell: pwsh
        run: |
          cp .env.example .env
          ../eng/github-actions/start-services-target.ps1 -V6 -odsV7-adminV2 -IncludeAdminApp -Rebuild

      - name: Wait for Admin App API and FE
        run: |
          set -euo pipefail

          api_url="https://localhost/adminapp-api/api/healthcheck"
          fe_url="https://localhost/adminapp/"
          keycloak_url="https://localhost/auth/realms/edfi/.well-known/openid-configuration"
          keycloak_login_url="https://localhost/auth/realms/edfi/protocol/openid-connect/auth?client_id=edfiadminapp&redirect_uri=https%3A%2F%2Flocalhost%2Fadminapp-api%2Fapi%2Fauth%2Fcallback%2F1&response_type=code&scope=openid%20profile%20email"

          # Require consecutive successful checks to avoid transient "ready" states.
          required_stable_checks=3
          stable_checks=0

          for i in {1..20}; do
            api_ok=0
            fe_ok=0
            keycloak_ok=0
            keycloak_login_ok=0

            if curl -ksSf "$api_url" > /dev/null; then
              api_ok=1
            fi

            if curl -ksSf "$fe_url" > /dev/null; then
              fe_ok=1
            fi

            if curl -ksSf "$keycloak_url" > /dev/null; then
              keycloak_ok=1
            fi

            if curl -ksSL "$keycloak_login_url" | grep -q 'kc-form-login'; then
              keycloak_login_ok=1
            fi

            if [ "$api_ok" -eq 1 ] && [ "$fe_ok" -eq 1 ] && [ "$keycloak_ok" -eq 1 ] && [ "$keycloak_login_ok" -eq 1 ]; then
              stable_checks=$((stable_checks + 1))
              echo "Readiness OK ($stable_checks/$required_stable_checks)"
            else
              stable_checks=0
              echo "Waiting... API=$api_ok FE=$fe_ok KEYCLOAK_META=$keycloak_ok KEYCLOAK_LOGIN=$keycloak_login_ok ($i/90)"
            fi

            if [ "$stable_checks" -ge "$required_stable_checks" ]; then
              echo "Admin App API, FE, and Keycloak metadata/login are stable"
              exit 0
            fi

            sleep 3
          done

          echo "Timed out waiting for stable Admin App services"
          exit 1

      - name: Create Local User Keycloak
        working-directory: ./eng/helpers
        shell: pwsh
        run: |
          pwsh create-local-user-keycloak.ps1

      - name: Run Playwright BDD E2E tests
        env:
          CI: true
          PLAYWRIGHT_CHROMIUM_ARGS: --ignore-certificate-errors
        run: npm run test:e2e:bdd

      - name: Upload Allure and JUnit results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-allure-results
          path: test-results
          retention-days: 5

      - name: Stop services
        if: always()
        shell: pwsh
        run: ./compose/stop.ps1
