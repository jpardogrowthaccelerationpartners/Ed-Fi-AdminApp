name: UI Playwright E2E

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, "patch-v*"]
    paths:
      - .github/workflows/run-e2e-ui.yml
      - tests/e2e/**
      - playwright.config.ts
      - package.json
      - package-lock.json
      - compose/**
      - eng/github-actions/**
      - packages/api/**
      - packages/fe/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  playwright-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node 22.23.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.0
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Create local TLS certificate
        working-directory: ./compose/ssl
        run: bash ./generate-certificate.sh

      - name: Download ODS Minimal Template backup
        run: |
          set -euo pipefail

          PACKAGE_NAME="EdFi.Suite3.Ods.Minimal.Template.PostgreSQL.Standard.4.0.0"
          PACKAGE_VERSION="7.3.20068"
          FEED_URL="https://pkgs.dev.azure.com/ed-fi-alliance/Ed-Fi-Alliance-OSS/_packaging/EdFi/nuget/v3/flat2/${PACKAGE_NAME}/${PACKAGE_VERSION}/${PACKAGE_NAME}.${PACKAGE_VERSION}.nupkg"
          BACKUP_DIR="compose/db-backup"
          SQL_FILE="EdFi.Ods.Minimal.Template.sql"

          mkdir -p "$BACKUP_DIR"

          echo "Downloading ${PACKAGE_NAME} v${PACKAGE_VERSION}..."
          curl -fsSL "$FEED_URL" -o "${BACKUP_DIR}/package.nupkg"

          echo "Extracting package..."
          cp "${BACKUP_DIR}/package.nupkg" "${BACKUP_DIR}/package.zip"
          unzip -q "${BACKUP_DIR}/package.zip" -d "${BACKUP_DIR}/pkg"

          echo "Locating SQL backup file inside package..."
          SRC_SQL=$(find "${BACKUP_DIR}/pkg" -name "*.sql" | head -n 1)
          if [ -z "$SRC_SQL" ]; then
            echo "ERROR: No .sql file found inside the NuGet package"
            exit 1
          fi
          echo "Found: $SRC_SQL"

          cp "$SRC_SQL" "${BACKUP_DIR}/${SQL_FILE}"
          cp "${BACKUP_DIR}/${SQL_FILE}" "${BACKUP_DIR}/EdFi.Ods.Populated.Template.sql"

          rm -rf "${BACKUP_DIR}/package.nupkg" "${BACKUP_DIR}/package.zip" "${BACKUP_DIR}/pkg"
          echo "Backup files ready in ${BACKUP_DIR}:"
          ls -lh "${BACKUP_DIR}"

      - name: List files
        run: |
          ls -la compose/db-backup

      - name: List files root
        run: |
          ls -la 
