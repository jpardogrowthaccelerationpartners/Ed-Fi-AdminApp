      [
        '-c',
        'envsubst < /app/appsettings.v3.dockertemplate.json > /app/appsettings.multitenantdocker.json && /app/run.sh',
      ]
    depends_on:
      - odsV7-adminV3-tenant1-db-admin
      - odsV7-adminV3-tenant2-db-admin
