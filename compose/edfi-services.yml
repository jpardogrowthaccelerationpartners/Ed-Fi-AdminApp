# This compose file defines the Ed-Fi ODS / API services required by the
# Ed-Fi Admin App for local development and testing.

services:
  # Ed-Fi v7.x - Single tenant
  odsV7-adminV2-single-db-ods:
    image: edfialliance/${ODS_DB_IMAGE_7X}:${ODS_DB_TAG_7X}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TPDM_ENABLED: '${TPDM_ENABLED:-true}'
    restart: always
    volumes:
      - vol-odsV7-adminV2-single-db-ods:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready  -U ${POSTGRES_USER}']
      start_period: 30s
      retries: 30
      interval: 30s
    networks:
      - edfiadminapp-network

  odsV7-adminV2-single-db-admin:
    image: edfialliance/ods-admin-api-db:${ADMIN_DB_TAG_7X}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # The following variables ared used by bootstrap.sh to set up the ODS
      # connection string in the OdsInstances table.
      ODS_PGBOUNCER_PORT: 5432
      ODS_POSTGRES_HOST: odsV7-adminV2-single-db-ods
      NPG_POOLING_ENABLED: '${NPG_POOLING_ENABLED:-true}'
      NPG_API_MAX_POOL_SIZE_ODS: '${NPG_API_MAX_POOL_SIZE_ODS:-20}'
    volumes:
      - ./settings/bootstrap.sh:/docker-entrypoint-initdb.d/2-bootstrap.sh
      - vol-odsV7-adminV2-single-db-admin:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready  -U ${POSTGRES_USER}']
      start_period: 30s
      retries: 30
      interval: 30s
    networks:
      - edfiadminapp-network

  odsV7-adminV2-single-api:
    image: edfialliance/ods-api-web-api:${ODS_API_TAG_7X}
    environment:
      ADMIN_POSTGRES_HOST: odsV7-adminV2-single-db-admin
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: 5432
      PATH_BASE: '${ODS_V7_ADMIN_V2_SINGLE_API_VIRTUAL_NAME}'
      TPDM_ENABLED: '${TPDM_ENABLED:-true}'
      ODS_WAIT_POSTGRES_HOSTS: 'odsV7-adminV2-single-db-ods '
      NPG_POOLING_ENABLED: '${NPG_POOLING_ENABLED:-true}'
      NPG_API_MAX_POOL_SIZE_ODS: '${NPG_API_MAX_POOL_SIZE_ODS:-20}'
      NPG_API_MAX_POOL_SIZE_ADMIN: '${NPG_API_MAX_POOL_SIZE_ADMIN:-20}'
      NPG_API_MAX_POOL_SIZE_SECURITY: '${NPG_API_MAX_POOL_SIZE_SECURITY:-20}'
      NPG_API_MAX_POOL_SIZE_MASTER: '${NPG_API_MAX_POOL_SIZE_MASTER:-20}'
      ODS_CONNECTION_STRING_ENCRYPTION_KEY: '${ODS_CONNECTION_STRING_ENCRYPTION_KEY}'
      ASPNETCORE_ENVIRONMENT: 'docker'
      FeatureManagement__MultiTenancy: false
      ApiSettings__OdsContextRouteTemplate: '{instanceId}'
    volumes:
      - ${LOGS_FOLDER}:/app/logs
    depends_on:
      - odsV7-adminV2-single-db-ods
      - odsV7-adminV2-single-db-admin
    restart: always
    hostname: ${ODS_V7_ADMIN_V2_SINGLE_API_VIRTUAL_NAME}
    healthcheck:
      test: ${ODS_V7_ADMIN_V2_SINGLE_API_HEALTHCHECK}
      start_period: 30s
      retries: 30
      interval: 30s
    networks:
      - edfiadminapp-network

  odsV7-adminV2-single-adminapi:
    image: edfialliance/ods-admin-api:${ADMIN_API_TAG_7X}
    environment:
      ADMIN_POSTGRES_HOST: odsV7-adminV2-single-db-admin
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ASPNETCORE_ENVIRONMENT: docker
      AppSettings__DatabaseEngine: PostgreSql
      AppSettings__PathBase: '${ODS_V7_ADMIN_V2_SINGLE_ADMIN_API_VIRTUAL_NAME}'
      Authentication__Authority: https://localhost/${ODS_V7_ADMIN_V2_SINGLE_ADMIN_API_VIRTUAL_NAME}
      Authentication__IssuerUrl: https://localhost/${ODS_V7_ADMIN_V2_SINGLE_ADMIN_API_VIRTUAL_NAME}
      Authentication__SigningKey: ${SIGNING_KEY}
      Authentication__AllowRegistration: true
      AppSettings__DefaultPageSizeOffset: ${PAGING_OFFSET:-0}
      AppSettings__DefaultPageSizeLimit: ${PAGING_LIMIT:-25}
      AppSettings__MultiTenancy: false
      AppSettings__EncryptionKey: ${ODS_CONNECTION_STRING_ENCRYPTION_KEY}
      SwaggerSettings__EnableSwagger: true
      SwaggerSettings__DefaultTenant: ${SWAGGER_DEFAULT_TENANT:-tenant1}
      Log4NetCore__Log4NetConfigFileName: ./log4net/log4net.config
      EnableDockerEnvironment: true
      AppSettings__AllowedOrigins: ${ALLOWED_ORIGINS:-https://localhost}
      AppSettings__EnableApplicationResetEndpoint: ${ENABLE_APPLICATION_RESET_ENDPOINT:-true}
      ConnectionStrings__EdFi_Admin: 'host=odsV7-adminV2-single-db-admin;port=5432;username=${POSTGRES_USER};password=${POSTGRES_PASSWORD};database=EdFi_Admin;'
      ConnectionStrings__EdFi_Security: 'host=odsV7-adminV2-single-db-admin;port=5432;username=${POSTGRES_USER};password=${POSTGRES_PASSWORD};database=EdFi_Security;'
      EdFiApiDiscoveryUrl: ${ODS_V7_ADMIN_V2_SINGLE_API_DISCOVERY_URL}
    volumes:
      - ./settings/log4net.config:/app/log4net/log4net.config
    depends_on:
      - odsV7-adminV2-single-db-admin
    restart: always
    hostname: ${ODS_V7_ADMIN_V2_SINGLE_ADMIN_API_VIRTUAL_NAME}
    healthcheck:
      test: ${ODS_V7_ADMIN_V2_SINGLE_ADMIN_API_HEALTHCHECK}
      start_period: 30s
      retries: 30
      interval: 30s
    networks:
      - edfiadminapp-network

  # Ed-Fi v7.x - Multi tenants
  odsV7-adminV2-tenant1-db-ods:
    image: edfialliance/${ODS_DB_IMAGE_7X}:${ODS_DB_TAG_7X}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TPDM_ENABLED: '${TPDM_ENABLED:-true}'
    restart: always
    volumes:
      - vol-odsV7-adminV2-tenant1-db-ods:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready  -U ${POSTGRES_USER}']
      start_period: 30s
      retries: 30
      interval: 30s
    networks:
      - edfiadminapp-network

  odsV7-adminV2-tenant2-db-ods:
    image: edfialliance/${ODS_DB_IMAGE_7X}:${ODS_DB_TAG_7X}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
