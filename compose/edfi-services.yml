      AppSettings__adminApiMode: v3
      ConnectionStrings__EdFi_Admin: 'host=odsV7-adminV3-single-db-admin;port=5432;username=${POSTGRES_USER};password=${POSTGRES_PASSWORD};database=EdFi_Admin;'
      ConnectionStrings__EdFi_Security: 'host=odsV7-adminV3-single-db-admin;port=5432;username=${POSTGRES_USER};password=${POSTGRES_PASSWORD};database=EdFi_Security;'
