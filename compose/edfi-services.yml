      TENANT_IDENTIFIER: tenant1
    volumes:
      - ./settings/bootstrap.sh:/docker-entrypoint-initdb.d/2-bootstrap.sh
      - vol-odsV7-adminV2-tenant1-db-admin:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready  -U ${POSTGRES_USER}']
      start_period: 30s
      retries: 30
      interval: 30s
    networks:
