      TPDM_ENABLED: '${TPDM_ENABLED:-true}'
      ODS_WAIT_POSTGRES_HOSTS: 'odsV7-adminV2-tenant1-db-ods odsV7-adminV2-tenant2-db-ods '
      NPG_POOLING_ENABLED: '${NPG_POOLING_ENABLED:-true}'
      NPG_API_MAX_POOL_SIZE_ODS: '${NPG_API_MAX_POOL_SIZE_ODS:-20}'
      NPG_API_MAX_POOL_SIZE_ADMIN: '${NPG_API_MAX_POOL_SIZE_ADMIN:-20}'
      NPG_API_MAX_POOL_SIZE_SECURITY: '${NPG_API_MAX_POOL_SIZE_SECURITY:-20}'
      NPG_API_MAX_POOL_SIZE_MASTER: '${NPG_API_MAX_POOL_SIZE_MASTER:-20}'
      ODS_CONNECTION_STRING_ENCRYPTION_KEY: '${ODS_CONNECTION_STRING_ENCRYPTION_KEY}'
      ASPNETCORE_ENVIRONMENT: 'docker'
    volumes:
      - ${LOGS_FOLDER}:/app/logs
      - ./settings/appsettings.v2.dockertemplate.json:/app/appsettings.v2.dockertemplate.json
    entrypoint: ['/bin/sh']
    command:
      [
        '-c',
        'envsubst < /app/appsettings.v2.dockertemplate.json > /app/appsettings.docker.json && /app/run.sh',
      ]
    depends_on:
      - odsV7-adminV2-tenant1-db-ods
      - odsV7-adminV2-tenant2-db-ods
      - odsV7-adminV2-tenant1-db-admin
      - odsV7-adminV2-tenant2-db-admin
    restart: always
    hostname: ${ODS_V7_ADMIN_V2_MULTI_API_VIRTUAL_NAME}
    healthcheck:
      test: ${ODS_V7_ADMIN_V2_MULTI_API_HEALTHCHECK_TEST}
      start_period: 30s
      retries: 30
      interval: 30s
    networks:
      - edfiadminapp-network

